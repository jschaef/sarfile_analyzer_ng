# Reference copy of the live nginx vhost for the SAR Analyzer WEB UI on
# dus-lab-sar: /etc/nginx/conf.d/sarfile-analyzer.conf (root-managed, part of
# the system nginx — NOT the rootless Caddy that fronts the API/MCP).
#
# Terminates TLS on :443 and proxies to the Streamlit app (127.0.0.1:8501).
# The WebSocket upgrade headers are required by Streamlit; client_max_body_size
# allows large SAR uploads through the UI. nginx uses its own cert under
# /etc/nginx/ssl/ (independent from Caddy's root-signed API/MCP cert).
#
# Included via nginx.conf: `include conf.d/*.conf;`. Apply changes as root:
#   sudo nginx -t && sudo systemctl reload nginx
server {
    listen              443 ssl;
    server_name         dus-lab-sar.lab.dus.suse.com;
    ssl_certificate     /etc/nginx/ssl/dus-lab-sar.lab.dus.suse.com.crt.pem;
    ssl_certificate_key /etc/nginx/ssl/dus-lab-sar.lab.dus.suse.com.key.pem;
    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains;";
    location / {
            client_max_body_size 2048M;
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
    }
}
